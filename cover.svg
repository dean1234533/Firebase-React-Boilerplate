<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif">

  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3730a3"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  </pattern>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- Left content -->

  <!-- Logo mark -->
  <rect x="80" y="80" width="44" height="44" rx="10" fill="#ffffff" opacity="0.15"/>
  <rect x="93" y="93" width="18" height="18" rx="4" fill="#ffffff"/>

  <!-- Brand name -->
  <text x="138" y="111" font-size="18" font-weight="600" fill="#ffffff" opacity="0.9">Starter Kit</text>

  <!-- Main headline -->
  <text x="80" y="240" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-1.5">Stop configuring.</text>
  <text x="80" y="312" font-size="58" font-weight="800" fill="#a5b4fc" letter-spacing="-1.5">Start shipping.</text>

  <!-- Sub headline -->
  <text x="80" y="376" font-size="22" font-weight="400" fill="#c7d2fe" opacity="0.85">Production-ready React + Firebase boilerplate.</text>
  <text x="80" y="408" font-size="22" font-weight="400" fill="#c7d2fe" opacity="0.85">Auth, CRUD, and Vercel deployment — done.</text>

  <!-- Tags -->
  <rect x="80" y="460" width="130" height="38" rx="8" fill="#ffffff" opacity="0.12"/>
  <text x="145" y="484" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">⚡ Firebase Auth</text>

  <rect x="224" y="460" width="120" height="38" rx="8" fill="#ffffff" opacity="0.12"/>
  <text x="284" y="484" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">📦 CRUD Ready</text>

  <rect x="358" y="460" width="140" height="38" rx="8" fill="#ffffff" opacity="0.12"/>
  <text x="428" y="484" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">🚀 Vercel Deploy</text>

  <rect x="512" y="460" width="120" height="38" rx="8" fill="#ffffff" opacity="0.12"/>
  <text x="572" y="484" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">🤖 AI-Ready</text>

  <!-- Save time badge -->
  <rect x="80" y="560" width="240" height="56" rx="12" fill="#ffffff" opacity="0.1"/>
  <text x="200" y="587" font-size="13" font-weight="500" fill="#c7d2fe" text-anchor="middle">SAVES YOU</text>
  <text x="200" y="608" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">20+ Hours of Setup</text>

  <!-- Right side — mock UI card -->
  <g filter="url(#shadow)">

    <!-- Main card -->
    <rect x="720" y="80" width="480" height="560" rx="16" fill="#1e1b4b" opacity="0.95"/>
    <rect x="720" y="80" width="480" height="560" rx="16" fill="url(#cardBg)"/>

    <!-- Card header bar -->
    <rect x="720" y="80" width="480" height="52" rx="16" fill="#312e81"/>
    <rect x="720" y="108" width="480" height="24" fill="#312e81"/>

    <!-- Traffic lights -->
    <circle cx="752" cy="106" r="7" fill="#ef4444" opacity="0.8"/>
    <circle cx="776" cy="106" r="7" fill="#f59e0b" opacity="0.8"/>
    <circle cx="800" cy="106" r="7" fill="#22c55e" opacity="0.8"/>

    <!-- URL bar -->
    <rect x="830" y="93" width="280" height="26" rx="6" fill="#1e1b4b" opacity="0.6"/>
    <text x="970" y="111" font-size="11" fill="#818cf8" text-anchor="middle">firebase-starter-kit.vercel.app</text>

    <!-- App header -->
    <rect x="736" y="152" width="448" height="50" rx="8" fill="#312e81" opacity="0.5"/>

    <!-- Logo in app -->
    <rect x="752" y="165" width="22" height="22" rx="5" fill="#6366f1"/>
    <rect x="758" y="171" width="10" height="10" rx="2" fill="#ffffff"/>
    <text x="782" y="181" font-size="13" font-weight="700" fill="#ffffff">Starter Kit</text>

    <!-- User info -->
    <circle cx="1176" cy="177" r="14" fill="#4338ca"/>
    <text x="1176" y="182" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">U</text>

    <!-- Page title -->
    <text x="752" y="238" font-size="18" font-weight="700" fill="#ffffff">My Items</text>
    <text x="752" y="258" font-size="12" fill="#818cf8">3 items</text>

    <!-- Add form -->
    <rect x="736" y="272" width="448" height="48" rx="10" fill="#312e81" opacity="0.6" stroke="#4338ca" stroke-width="1"/>
    <text x="756" y="301" font-size="13" fill="#6366f1" opacity="0.6">Add a new item...</text>
    <rect x="1128" y="280" width="44" height="32" rx="8" fill="#4F46E5"/>
    <text x="1150" y="301" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Add</text>

    <!-- Item 1 -->
    <rect x="736" y="336" width="448" height="52" rx="10" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
    <text x="756" y="367" font-size="13" fill="#e0e7ff">Design landing page hero section</text>
    <rect x="1100" y="350" width="36" height="24" rx="6" fill="none" stroke="#4338ca" stroke-width="1"/>
    <text x="1118" y="367" font-size="11" fill="#818cf8" text-anchor="middle">Edit</text>
    <rect x="1144" y="350" width="28" height="24" rx="6" fill="none" stroke="#7f1d1d" stroke-width="1" opacity="0.6"/>
    <text x="1158" y="367" font-size="11" fill="#f87171" text-anchor="middle" opacity="0.8">Del</text>

    <!-- Item 2 -->
    <rect x="736" y="396" width="448" height="52" rx="10" fill="#1e1b4b" stroke="#312e81" stroke-width="1"/>
    <text x="756" y="427" font-size="13" fill="#e0e7ff">Set up Stripe billing integration</text>
    <rect x="1100" y="410" width="36" height="24" rx="6" fill="none" stroke="#4338ca" stroke-width="1"/>
    <text x="1118" y="427" font-size="11" fill="#818cf8" text-anchor="middle">Edit</text>
    <rect x="1144" y="410" width="28" height="24" rx="6" fill="none" stroke="#7f1d1d" stroke-width="1" opacity="0.6"/>
    <text x="1158" y="427" font-size="11" fill="#f87171" text-anchor="middle" opacity="0.8">Del</text>

    <!-- Item 3 — edit mode -->
    <rect x="736" y="456" width="448" height="52" rx="10" fill="#1e1b4b" stroke="#4F46E5" stroke-width="1.5"/>
    <rect x="752" y="468" width="280" height="28" rx="6" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
    <text x="762" y="487" font-size="12" fill="#a5b4fc">Write onboarding email sequence_</text>
    <rect x="1044" y="468" width="52" height="28" rx="6" fill="#4F46E5"/>
    <text x="1070" y="487" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Save</text>
    <rect x="1104" y="468" width="64" height="28" rx="6" fill="none" stroke="#4338ca" stroke-width="1"/>
    <text x="1136" y="487" font-size="11" fill="#818cf8" text-anchor="middle">Cancel</text>

    <!-- Auth section peek -->
    <rect x="736" y="524" width="448" height="100" rx="10" fill="#312e81" opacity="0.3"/>
    <text x="960" y="568" font-size="12" font-weight="600" fill="#6366f1" text-anchor="middle">✓ Secured by Firebase Auth</text>
    <text x="960" y="590" font-size="11" fill="#818cf8" text-anchor="middle">Users only see their own data</text>
    <text x="960" y="610" font-size="11" fill="#818cf8" text-anchor="middle">Firestore rules enforce access control</text>

  </g>

  <!-- Bottom left -->
  <text x="80" y="690" font-size="13" fill="#818cf8" opacity="0.7">React 18 · TypeScript · Firebase v11 · Tailwind CSS · Vite · Vercel</text>

</svg>
