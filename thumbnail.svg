<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif">

  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3730a3"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.07"/>
  </pattern>
  <rect width="600" height="600" fill="url(#grid)"/>

  <!-- Glow circle -->
  <circle cx="300" cy="210" r="180" fill="#6366f1" opacity="0.15"/>

  <!-- Logo mark -->
  <rect x="258" y="78" width="84" height="84" rx="20" fill="#ffffff" opacity="0.12"/>
  <rect x="258" y="78" width="84" height="84" rx="20" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>
  <rect x="278" y="98" width="44" height="44" rx="10" fill="#ffffff"/>
  <rect x="290" y="110" width="20" height="20" rx="5" fill="#4F46E5"/>

  <!-- React + Firebase text -->
  <text x="300" y="216" font-size="22" font-weight="700" fill="#c7d2fe" text-anchor="middle" letter-spacing="2">REACT + FIREBASE</text>

  <!-- Main title -->
  <text x="300" y="272" font-size="42" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-1">SaaS Starter</text>
  <text x="300" y="320" font-size="42" font-weight="800" fill="#a5b4fc" text-anchor="middle" letter-spacing="-1">Kit</text>

  <!-- Divider -->
  <line x1="120" y1="348" x2="480" y2="348" stroke="#ffffff" stroke-width="1" opacity="0.15"/>

  <!-- Feature tags row 1 -->
  <rect x="60" y="366" width="110" height="32" rx="8" fill="#ffffff" opacity="0.1"/>
  <text x="115" y="387" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">⚡ Auth</text>

  <rect x="182" y="366" width="130" height="32" rx="8" fill="#ffffff" opacity="0.1"/>
  <text x="247" y="387" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">📦 Firestore</text>

  <rect x="324" y="366" width="110" height="32" rx="8" fill="#ffffff" opacity="0.1"/>
  <text x="379" y="387" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">🚀 Vercel</text>

  <rect x="446" y="366" width="110" height="32" rx="8" fill="#ffffff" opacity="0.1"/>
  <text x="501" y="387" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">💳 Stripe</text>

  <!-- Feature tags row 2 -->
  <rect x="60" y="410" width="130" height="32" rx="8" fill="#ffffff" opacity="0.1"/>
  <text x="125" y="431" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">🛡 Secure Rules</text>

  <rect x="202" y="410" width="120" height="32" rx="8" fill="#ffffff" opacity="0.1"/>
  <text x="262" y="431" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">🌙 Dark Mode</text>

  <rect x="334" y="410" width="120" height="32" rx="8" fill="#ffffff" opacity="0.1"/>
  <text x="394" y="431" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">⚙️ Settings</text>

  <rect x="466" y="410" width="90" height="32" rx="8" fill="#ffffff" opacity="0.1"/>
  <text x="511" y="431" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">🤖 AI</text>

  <!-- Bottom badge -->
  <rect x="150" y="474" width="300" height="72" rx="14" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15"/>
  <text x="300" y="500" font-size="12" font-weight="500" fill="#a5b4fc" text-anchor="middle">SAVES YOU</text>
  <text x="300" y="524" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">40+ Hours of Setup</text>
  <text x="300" y="542" font-size="11" fill="#c7d2fe" text-anchor="middle" opacity="0.7">Auth · Stripe · Dark Mode · CRUD · Deploy</text>

</svg>
